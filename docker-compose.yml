services:
  frontend:
    build:
      context: ./vite-frontend
    ports:
      - '5173:5173'
    volumes:
      - ./vite-frontend:/app
      - /app/node_modules
    env_file:
      - ./vite-frontend/.env
    depends_on:
      - backend

  backend:
    build:
      context: ./backend
    ports:
      - '4000:4000'
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env
    depends_on:
      - redis
      - mongodb

  worker:
    build:
      context: ./backend
    command: npm run worker
    volumes:
      - ./backend:/app
      - /app/node_modules
    env_file:
      - ./backend/.env
    depends_on:
      - mongodb
      - redis

  mongodb:
    image: mongo:7-jammy
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  mongo_data:
